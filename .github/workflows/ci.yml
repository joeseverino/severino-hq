name: ci

# Push to main is the deploy trigger. Every gate below must pass before the
# self-hosted deploy job runs — a red commit physically cannot reach the box.
# Pull requests run the checks only (no build, no deploy).
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check .

  test:
    name: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    env:
      DJANGO_DEBUG: "1"
      DJANGO_SECRET_KEY: ci-only-secret-key-not-for-production
      DJANGO_ALLOWED_HOSTS: "127.0.0.1,testserver"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
      - run: pip install -r requirements.txt coverage
      - run: python manage.py check
      - run: python manage.py makemigrations --check --dry-run
      - name: Tests with coverage gate
        run: |
          coverage run manage.py test --verbosity 2
          coverage report --fail-under=70
          pct="$(coverage report --format=total 2>/dev/null || echo '')"
          if [ "${{ matrix.python-version }}" = "3.12" ] && [ -n "$pct" ]; then
            echo "### Test coverage: ${pct}%" >> "$GITHUB_STEP_SUMMARY"
          fi

  security:
    name: security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      # Production-posture check: DEBUG off, real host. --fail-level WARNING
      # turns Django's security advisories into hard failures. The env below
      # mirrors a real prod config so the check validates how settings.py
      # translates it — not CI artifacts. The key is a throwaway >50-char value
      # only to satisfy the strength check (W009).
      - name: Django deployment check
        env:
          DJANGO_DEBUG: "0"
          DJANGO_SECRET_KEY: "ci-only-deploy-check-key-0123456789abcdef0123456789abcdef"
          DJANGO_ALLOWED_HOSTS: "hq.example.com"
          DJANGO_BEHIND_TLS_PROXY: "1"
          DJANGO_SESSION_COOKIE_SECURE: "1"
          DJANGO_CSRF_COOKIE_SECURE: "1"
          DJANGO_HSTS_SECONDS: "31536000"
          DJANGO_HSTS_INCLUDE_SUBDOMAINS: "1"
          DJANGO_HSTS_PRELOAD: "1"
        run: python manage.py check --deploy --fail-level WARNING
      - name: pip-audit
        uses: pypa/gh-action-pip-audit@1220774d901786e6f652ae159f7b6bc8fea6d266 # v1.1.0
        with:
          inputs: requirements.txt

  build:
    name: build
    needs: [lint, test, security]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.build.outputs.image }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
      - name: Build and push
        id: build
        run: |
          IMAGE="ghcr.io/${{ github.repository }}"
          TAG="sha-${GITHUB_SHA::12}"
          docker build -t "$IMAGE:$TAG" -t "$IMAGE:latest" .
          docker push "$IMAGE:$TAG"
          docker push "$IMAGE:latest"
          echo "image=$IMAGE:$TAG" >> "$GITHUB_OUTPUT"

  scan:
    name: scan
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      # Scans the exact artifact about to ship, between build and deploy.
      # Fails the pipeline on a fixable HIGH/CRITICAL in the image.
      - name: Trivy scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        env:
          TRIVY_USERNAME: ${{ github.actor }}
          TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        with:
          image-ref: ${{ needs.build.outputs.image }}
          format: table
          exit-code: "1"
          severity: HIGH,CRITICAL
          ignore-unfixed: true

  deploy:
    name: deploy
    needs: [build, scan]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    # Self-hosted runner ON the homelab. It dials out to GitHub; GitHub never
    # connects in. NEVER trigger a self-hosted job from pull_request.
    runs-on: [self-hosted, severino-hq]
    environment: production
    permissions:
      contents: read
      packages: read
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    steps:
      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
      - name: Pull image and restart container
        env:
          SEVERINO_IMAGE: ${{ needs.build.outputs.image }}
        run: |
          cd /opt/apps/severino-hq
          docker compose pull app
          docker compose up -d --no-build app
      - name: Wait for healthy
        run: |
          for i in $(seq 1 12); do
            status="$(docker inspect --format '{{.State.Health.Status}}' severino-hq 2>/dev/null || echo missing)"
            echo "health: $status"
            [ "$status" = "healthy" ] && exit 0
            sleep 5
          done
          echo "::error::container did not become healthy"
          docker logs --tail 50 severino-hq || true
          exit 1
      - name: Reclaim disk (drop stale images + build cache)
        if: always()
        # Every release pulls a new sha-tagged image (~250MB). Without this the
        # homelab disk fills and a later deploy wedges on ENOSPC. Prune unused
        # images older than 24h (keeps a same-day rollback) plus build cache.
        run: |
          docker image prune -af --filter "until=24h" || true
          docker builder prune -af || true
