{% extends "base.html" %}
{% block title %}Delete {{ record.doc_id }}{% endblock %}
{% block content %}
<h1>Delete doc record?</h1>
<p>This will remove the index entry <code>{{ record.doc_id }}</code> — the underlying file in your Obsidian vault is untouched.</p>
<form method="post">
  {% csrf_token %}
  <div class="form-actions">
    <button type="submit" class="danger">Delete</button>
    <a class="btn" href="{{ record.get_absolute_url }}">Cancel</a>
  </div>
</form>
{% endblock %}
