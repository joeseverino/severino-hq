{% if is_paginated %}
<nav class="pagination">
  {% if page_obj.has_previous %}
    <a href="?{% if request.GET.urlencode %}{{ request.GET.urlencode }}&{% endif %}page={{ page_obj.previous_page_number }}">&larr; Prev</a>
  {% else %}
    <span class="muted">&larr; Prev</span>
  {% endif %}
  <span class="muted">Page {{ page_obj.number }} of {{ paginator.num_pages }}</span>
  {% if page_obj.has_next %}
    <a href="?{% if request.GET.urlencode %}{{ request.GET.urlencode }}&{% endif %}page={{ page_obj.next_page_number }}">Next &rarr;</a>
  {% else %}
    <span class="muted">Next &rarr;</span>
  {% endif %}
</nav>
{% endif %}
