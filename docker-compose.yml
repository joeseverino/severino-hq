# Severino HQ — homelab Docker Compose.
#
# Uses host networking so the MCP boundary receives the real socket peer
# instead of Docker's bridge gateway address. Nginx Proxy Manager reaches the
# browser UI at <host-LAN-IP>:8000; MCP clients connect directly to the host's
# Tailscale IP on the same port.
#
# Volumes:
#   data/    SQLite DB
#   media/   Uploaded receipt files (private — never publicly exposed)
#   exports/ Generated exports
#   static/  Collected static files
#
# The image runs as UID/GID 10001. `chown -R 10001:10001` the host bind
# mounts before first boot (or use docker volumes, as below, and let the
# container manage permissions).

services:
  app:
    build: .
    # Local dev builds severino-hq:latest. CI/CD overrides this to the GHCR
    # image (SEVERINO_IMAGE=ghcr.io/joeseverino/severino-hq:sha-…) so the
    # homelab `docker compose pull && up -d --no-build` deploys the exact,
    # already-tested-and-scanned artifact instead of rebuilding on the box.
    image: ${SEVERINO_IMAGE:-severino-hq:latest}
    container_name: severino-hq
    network_mode: host
    restart: unless-stopped
    env_file: .env
    environment:
      # Inside the container we always use these paths; the .env file may
      # override them for non-container deploys.
      SEVERINO_DATABASE_PATH: /data/severino.sqlite3
      SEVERINO_MEDIA_ROOT: /media
      SEVERINO_EXPORTS_ROOT: /exports
      DJANGO_STATIC_ROOT: /static
      # Production mounts the validator token as a file. The /dev/null default
      # keeps MCP disabled in development without putting a token in .env.
      SEVERINO_MCP_TOKEN_FILE: /run/secrets/severino_mcp_token
    volumes:
      - severino_data:/data
      - severino_media:/media
      - severino_exports:/exports
      - severino_static:/static
      - type: bind
        source: ${SEVERINO_MCP_TOKEN_FILE_HOST:-/dev/null}
        target: /run/secrets/severino_mcp_token
        read_only: true
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys;sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/accounts/login/',timeout=3).status in (200,302) else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  severino_data:
  severino_media:
  severino_exports:
  severino_static:
